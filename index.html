<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Triversi</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #101010;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <!-- Build the `gui` binary to WebAssembly. -->
    <link data-trunk rel="rust" data-bin="gui" data-wasm-opt="2" />
  </head>
  <body>
    <canvas id="triversi_canvas"></canvas>
  </body>
</html>
